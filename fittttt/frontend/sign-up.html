<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitTrack - Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('images/bgimage2.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .form-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 5%;
    }

    .overlay {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 1rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    .btn-success {
      background-color: #28a745;
      border: none;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .btn-success:hover {
      background-color: #218838;
      transform: scale(1.03);
    }

    .input-group-text {
      background-color: #f0f0f0;
      border-radius: 0.5rem 0 0 0.5rem;
    }

    .form-control {
      border-radius: 0.5rem;
    }

    .form-control:focus {
      box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
    }

    a {
      color: #28a745;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .overlay h3 {
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="overlay">
      <h3 class="mb-4 text-center">Sign Up</h3>
      <form action="index.html" onsubmit="localStorage.setItem('signedIn', true)">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" class="form-control" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" class="form-control" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" required />
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100">Sign Up</button>

        <p class="text-center mt-3">Already have an account? <a href="sign-in.html">Sign In</a></p>
      </form>
    </div>
  </div>


<script>
document.querySelector("form").addEventListener("submit", function (e) {
  e.preventDefault();

  const inputs = document.querySelectorAll("input");
  const name = inputs[0].value;
  const email = inputs[1].value;
  const password = inputs[2].value;

  fetch("/api/users/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password }),
  })
    .then((res) => res.json())
    .then((data) => {
      if (data.email) {
        localStorage.setItem("userEmail", data.email);
        window.location.href = "index.html";
      } else {
        alert(data.message || "Signup failed");
      }
    })
    .catch((err) => alert("Error: " + err.message));
});
</script>
    
  </script>
</body>
</html>
