<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Analytics - Fitness Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="index.html">Fitness Tracker</a>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="history.html">Workout History</a></li>
        <li class="nav-item"><a class="nav-link active" href="analytics.html">Analytics</a></li>
      </ul>
    </div>
  </nav>

  <!-- Analytics Section -->
  <div class="container my-5">
    <h2><span class="feature-icon">📈</span> Your Fitness Analytics</h2>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="card p-3">
          <h5 class="text-center">Calories Burned (This Week)</h5>
          <canvas id="caloriesChart"></canvas>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card p-3">
          <h5 class="text-center">Performance (This Week)</h5>
          <canvas id="performanceChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    const userEmail = localStorage.getItem("userEmail");
    if (!userEmail) {
      alert("You must be signed in to view analytics.");
      throw new Error("No user email found.");
    }

    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const calories = [0, 0, 0, 0, 0, 0, 0];
    const performance = [0, 0, 0, 0, 0, 0, 0];

    fetch(`http://localhost:5002/api/activities?email=${userEmail}`)
      .then(res => {
        if (!res.ok) throw new Error("Failed to fetch activities");
        return res.json();
      })
      .then(data => {
        console.log("Fetched activities:", data);
        data.forEach(activity => {
          const date = new Date(activity.date);
          const dayIndex = date.getDay();
          calories[dayIndex] += activity.calories || 0;
          performance[dayIndex] += activity.duration || 0; // Duration in minutes
        });

        new Chart(document.getElementById('caloriesChart'), {
          type: 'bar',
          data: {
            labels: days,
            datasets: [{
              label: 'Calories Burned',
              data: calories,
              backgroundColor: 'rgba(255, 99, 132, 0.6)'
            }]
          },
          options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
          }
        });

        new Chart(document.getElementById('performanceChart'), {
          type: 'line',
          data: {
            labels: days,
            datasets: [{
              label: 'Duration (minutes)',
              data: performance,
              borderColor: 'rgba(75, 192, 192, 1)',
              backgroundColor: 'rgba(75, 192, 192, 0.2)',
              fill: true,
              tension: 0.4
            }]
          },
          options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
          }
        });
      })
      .catch(err => {
        console.error("Analytics load error:", err);
        alert("Unable to load analytics. Check console for details.");
      });
  </script>

  <footer class="bg-dark text-white text-center p-3">
    <p>© 2025 FitTrack. Built with ❤️ by Usha, Anjali, Divya</p>
  </footer>
</body>
</html>
