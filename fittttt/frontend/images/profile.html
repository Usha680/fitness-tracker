<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile - Fitness Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="index.html">Fitness Tracker</a>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="goals.html">Fitness Goals</a></li>
        <li class="nav-item"><a class="nav-link" href="history.html">Workout History</a></li>
        <li class="nav-item"><a class="nav-link" href="analytics.html">Analytics</a></li>
        <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
      </ul>
    </div>
  </nav>

  <!-- Profile Section -->
  <div class="container my-5">
    <div class="card p-4">
      <h2 style="color:black"><span class="feature-icon">👤</span> Profile</h5>
Your Profile</h2>
      <form id="profileForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name" value="John Doe" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" value="john@example.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Age</label>
          <input type="number" class="form-control" id="age" value="25" />
        </div>
        <div class="mb-3">
          <label class="form-label">Fitness Preference</label>
          <select class="form-select" id="preference">
            <option>General Fitness</option>
            <option>Weight Loss</option>
            <option>Muscle Gain</option>
            <option>Cardio Training</option>
            <option>Yoga & Flexibility</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success">Save Profile</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
